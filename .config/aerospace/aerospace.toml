config-version = 2
start-at-login = false
persistent-workspaces = ["1", "2", "3", "4", "5", "6"]
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

after-login-command = []
after-startup-command = []

# enable-normalization-flatten-containers = true
# enable-normalization-opposite-orientation-for-nested-containers = true
# accordion-padding = 0
# default-root-container-layout = 'tiles'
# default-root-container-orientation = 'horizontal'

[key-mapping]
preset = 'qwerty'

# Force all windows to be floating
[[on-window-detected]]
run = "layout floating"

[workspace-to-monitor-force-assignment]
# Docked: 1-3 on Odyssey, 4-6 on Dell
# Undocked (built-in only): everything falls back to built-in
1 = ['^Odyssey G95SC$', 'built-in']
2 = ['^Odyssey G95SC$', 'built-in']
3 = ['^Odyssey G95SC$', 'built-in']
4 = ['^DELL S2722DGM$', 'built-in']
5 = ['^DELL S2722DGM$', 'built-in']
6 = ['^DELL S2722DGM$', 'built-in']


[mode.main.binding]
cmd-h = []     # Disable "hide application"
cmd-alt-h = [] # Disable "hide others"

cmd-ctrl-f = [] # Disable fullscreen

# Opt+Enter open Ghostty
alt-enter = 'exec-and-forget open -a "Ghostty"'

# Reload config
alt-shift-r = 'reload-config'

# See: https://nikitabobko.github.io/AeroSpace/commands#work«space
cmd-ctrl-alt-shift-1 = 'workspace 1'
cmd-ctrl-alt-shift-2 = 'workspace 2'
cmd-ctrl-alt-shift-3 = 'workspace 3'
cmd-ctrl-alt-shift-4 = 'workspace 4'
cmd-ctrl-alt-shift-5 = 'workspace 5'
cmd-ctrl-alt-shift-6 = 'workspace 6'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'

alt-tab = 'move-node-to-monitor --wrap-around --focus-follows-window next'

# [gaps]
# inner.horizontal = 0
# inner.vertical = 0
# outer.left = 0
# outer.bottom = 0
# outer.top = 0
# outer.right = 0

# # Super + T | toggles floating/tile layout
# cmd-ctrl-alt-shift-t = 'layout floating tiles horizontal'

# # Super + 0 | balances sizes for windows in workspace
# cmd-ctrl-alt-shift-0 = 'balance-sizes'

# # Option + hjkl | directional focus
# alt-h = 'focus left'
# alt-j = 'focus down'
# alt-k = 'focus up'
# alt-l = 'focus right'

# # Option + hjkl | directional move
# alt-shift-h = 'move left'
# alt-shift-j = 'move down'
# alt-shift-k = 'move up'
# alt-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
# cmd-ctrl-alt-shift-minus = 'resize smart -50'
# cmd-ctrl-alt-shift-equal = 'resize smart +50'

